            <iframe id="news-frame" src="about:blank" class="w-full h-full border-none" title="Bundle Archive"></iframe>

    <script>
        const newsFrame = document.getElementById('news-frame');
        const overlay = document.getElementById('loading-overlay');
        const viewerContainer = document.getElementById('newsletter-viewer');
        const BASE_URL = "https://static.bundle.app/newsletter/";

        const btnToday = document.getElementById('btn-today');
        const btnYesterday = document.getElementById('btn-yesterday');
        
        // App Menu Logic
        const btnAppsMenu = document.getElementById('btn-apps-menu');
        const appsDropdown = document.getElementById('apps-dropdown');
        let isAppsMenuOpen = false;

        btnAppsMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            isAppsMenuOpen = !isAppsMenuOpen;
            if (isAppsMenuOpen) {
                appsDropdown.classList.remove('opacity-0', 'invisible');
                appsDropdown.classList.add('opacity-100', 'visible');
            } else {
                appsDropdown.classList.add('opacity-0', 'invisible');
                appsDropdown.classList.remove('opacity-100', 'visible');
            }
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (isAppsMenuOpen && !appsDropdown.contains(e.target) && e.target !== btnAppsMenu) {
                appsDropdown.classList.add('opacity-0', 'invisible');
                appsDropdown.classList.remove('opacity-100', 'visible');
                isAppsMenuOpen = false;
            }
        });

        // Aviation Accordion Toggle
        const aviationSublinks = document.getElementById('aviation-sublinks');
        const aviationChevron = document.getElementById('aviation-chevron');
        
        function toggleAviationMenu(e) {
            if(e) e.stopPropagation();
            aviationSublinks.classList.toggle('hidden');
            aviationSublinks.classList.toggle('flex');
            aviationChevron.classList.toggle('rotate-180');
        }

        let isViewerVisible = false;

        newsFrame.onload = () => {
            setTimeout(() => {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.style.display = 'none', 300);
            }, 500);
        };

        function openInViewer(url) {
            // Close the apps dropdown if it is open
            if (isAppsMenuOpen) {
                appsDropdown.classList.add('opacity-0', 'invisible');
                appsDropdown.classList.remove('opacity-100', 'visible');
                isAppsMenuOpen = false;
            }

            viewerContainer.classList.remove('hidden');
            
            // Only show Today/Yesterday buttons if the URL is a Bundle newsletter
            if (url.startsWith(BASE_URL)) {
                btnToday.classList.remove('hidden');
                btnYesterday.classList.remove('hidden');
            } else {
                btnToday.classList.add('hidden');
                btnYesterday.classList.add('hidden');
            }
            
            isViewerVisible = true;
            
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            }, 10);
            
            newsFrame.src = url;
        }

        function loadForDate(d) {
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const url = `${BASE_URL}${day}-${month}-${year}.html`;
            
            openInViewer(url);
        }

        document.getElementById('bundle-logo').addEventListener('click', () => {
            if (isViewerVisible) {
                viewerContainer.classList.add('hidden');
                btnToday.classList.add('hidden');
                btnYesterday.classList.add('hidden');
                isViewerVisible = false;
                newsFrame.src = "about:blank"; // Clear memory when closed
            } else {
                loadForDate(new Date());
            }
        });

        btnToday.addEventListener('click', () => {
            loadForDate(new Date());
        });

        btnYesterday.addEventListener('click', () => {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            loadForDate(yesterday);
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        window.addEventListener('message', (event) => {
            if (event.data.type === 'THEME_CHANGE') {
                if (event.data.isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        });
    </script>
</body>
</html>
